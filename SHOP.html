<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GREEN SHOP</title>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
}

header{
background:#00ff66;
color:#000;
padding:12px;
text-align:center;
font-size:30px;
font-weight:bold;
box-shadow:0 0 30px #00ff66;
}

.search{
text-align:center;
padding:20px;
}

.search input{
width:80%;
max-width:500px;
padding:15px;
border-radius:10px;
border:none;
box-shadow:0 0 20px #00ff66;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#050505;
border:2px solid #00ff66;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 20px #00ff66;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.info{
padding:15px;
}

.title{
font-size:22px;
}

.price{
color:#00ff66;
font-size:24px;
font-weight:bold;
}

.buy{
width:100%;
padding:12px;
margin-top:15px;
background:#00ff66;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.buy:hover{
background:#00ffaa;
}


.add-btn{
    position:absolute;
    right:20px;
    top:14px;

    background:#00ff66;
    color:#000;

    border:none;
    border-radius:8px;

    padding:12px 18px;

    font-weight:bold;
    cursor:pointer;

    box-shadow:0 0 20px #00ff66;
}


.add-btn:hover{
    background:#4DFFB8;
    box-shadow:0 0 35px #ff0033;
}



.menu-btn{
    position:absolute;
    right:190px;
    top:14px;

    background:#00ff66;
    color:#000;

    border:none;
    border-radius:8px;

    padding:12px 18px;

    font-weight:bold;
    cursor:pointer;

    box-shadow:0 0 20px #00ff66;
	
}

.menu-btn:hover{
    background:#4DFFB8;
    box-shadow:0 0 35px #0033;


</style>

</head>

<div class="products" id="products"></div>

let box=document.getElementById("products");


function showProducts(list){

box.innerHTML="";


list.forEach((product,index)=>{


box.innerHTML+=`

<div class="card">

<img src="${product.image}">

<div class="info">

<div class="title">
${product.name}
</div>

<div class="price">
${product.price}
</div>


<button class="buy" onclick="buy(${index})">
Купить
</button>

</div>

</div>

`;

});


}



function buy(index){

window.open(

);

document.getElementById("search").oninput=function(){

let text=this.value.toLowerCase();


let result=products.filter(product=>

product.name.toLowerCase().includes(text)

);

};
