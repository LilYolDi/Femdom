<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Y-FETISH</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">
    <span class="red">Y</span>-FETISH
  </div>

  <div class="search">
    <input type="text" placeholder="Поиск видео...">
    <button>🔍</button>
  </div>

  <a href="upload.html" class="upload-btn">➕ Добавить видео</a>
</header>

<main>

<!-- ЛЕВАЯ ЧАСТЬ: ВИДЕО -->
<section class="player">

  <video id="video" controls poster="poster.jpg">

    Ваш браузер не поддерживает видео.
  </video>

  <!-- УПРАВЛЕНИЕ -->
  <div class="controls">
    <button>▶️</button>
    <button>⏸️</button>
    <button>🔊</button>
    <button>⛶</button>
  </div>

  <!-- ИНФО -->
  <div class="info">
    <h1>Добро пожаловать в Y-FETISH</h1>

    <div class="stats">
      <span>👁 1523</span>
      <span>•</span>
      <span>12 минут</span>
      <span>•</span>
      <span>Сегодня</span>
    </div>
  </div>

  <!-- ЛАЙКИ -->
  <div class="buttons">
    <button>👍 <span>352</span></button>
    <button>👎 <span>18</span></button>
  </div>

  <!-- ОПИСАНИЕ (ВНИЗУ) -->
  <div class="description">
    <h3>Описание</h3>
    <p>
     Две русской Госпожи, заставляют рабыню, нюхать им потные носки.    </p>
  </div>

</section>

<!-- ПРАВАЯ ЧАСТЬ: ВИДЕО СПИСОК -->
<aside>

    <img src="https://picsum.photos/300/170?1">

    <p>12 000 просмотров</p>
  </div>

  <div class="card">
    <img src="https://picsum.photos/300/170?2">
    <h3>Второе видео</h3>
    <p>8 200 просмотров</p>

    <img src="https://picsum.photos/300/170?3">

</aside>

</main>

</html>
